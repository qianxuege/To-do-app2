{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Log in</title>
  </head>
  <body data-mode="login">
    <h1>Log in</h1>

    <form id="auth-form">
      <div>
        <label>
          Username
          <input type="text" name="username" required minlength="3" maxlength="150" />
        </label>
      </div>
      <div>
        <label>
          Password
          <input type="password" name="password" required />
        </label>
      </div>
      <button type="submit">Log in</button>
    </form>

    <p id="auth-error" style="color:crimson;"></p>

    <p>
      Need an account?
      <a href="/register/">Register</a>
    </p>

    <script src="{% static 'js/auth.js' %}"></script>
  </body>
</html>
